name: Reminder notifications

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Ping cron endpoint
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "APP_URL / CRON_SECRET secrets not set — skipping."
            exit 0
          fi
          curl -fsS -H "Authorization: Bearer $CRON_SECRET" "$APP_URL/api/cron/notify"
